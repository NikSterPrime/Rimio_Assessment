<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rimigo — We'll Be Right Back</title>
  <link rel="icon" type="image/svg+xml" href="https://media.rimigo.com/1772543482763_logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Red+Hat+Display:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7011F6;
      --primary-dark: #4D1D91;
      --primary-light: #AB72FB;
      --pale-purple: #F5EDFF;
      --grey-0: #101010;
      --grey-1: #363636;
      --grey-2: #747474;
      --surface: #0A0A0F;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--surface);
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 24px 0;
    }

    /* ── Animated mesh gradient background ── */
    .mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .mesh__orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      will-change: transform;
    }
    .mesh__orb--1 {
      width: 60vmax; height: 60vmax;
      background: radial-gradient(circle, #7011F6 0%, transparent 70%);
      top: -20%; left: -15%;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .mesh__orb--2 {
      width: 50vmax; height: 50vmax;
      background: radial-gradient(circle, #AB72FB 0%, transparent 70%);
      bottom: -25%; right: -10%;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .mesh__orb--3 {
      width: 35vmax; height: 35vmax;
      background: radial-gradient(circle, #4D1D91 0%, transparent 70%);
      top: 40%; left: 55%;
      animation: drift3 15s ease-in-out infinite alternate;
    }
    .mesh__orb--4 {
      width: 25vmax; height: 25vmax;
      background: radial-gradient(circle, rgba(112,17,246,0.4) 0%, transparent 70%);
      top: 10%; right: 20%;
      animation: drift1 25s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.15); }
    }
    @keyframes drift2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, -80px) scale(1.1); }
    }
    @keyframes drift3 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-40px, 50px) scale(1.2); }
    }

    /* ── Film grain overlay ── */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      animation: grain-shift 0.5s steps(1) infinite;
    }
    @keyframes grain-shift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-5%, -5%); }
      50% { transform: translate(5%, 0); }
      75% { transform: translate(-2%, 5%); }
      100% { transform: translate(0, 0); }
    }

    /* ── Glassmorphism card with shark bite ── */
    .glass-wrap {
      position: relative;
      z-index: 2;
      max-width: 520px;
      width: calc(100% - 48px);
    }
    /* Shared bite clip-path */
    .bite-shape {
      clip-path: polygon(
        0% 0%,
        100% 0%,
        100% 100%,
        0% 100%,
        /* Straight bottom edge up to bite zone */
        0% 76%,
        /* Shark teeth — 10 teeth from 76% to 26% */
        11% 73.5%, 0% 71%,
        12% 68.5%, 0% 66%,
        13% 63.5%, 0% 61%,
        12% 58.5%, 0% 56%,
        13% 53.5%, 0% 51%,
        12% 48.5%, 0% 46%,
        13% 43.5%, 0% 41%,
        12% 38.5%, 0% 36%,
        11% 33.5%, 0% 31%,
        10% 28.5%, 0% 26%,
        /* Straight top edge back to start */
        0% 0%
      );
    }
    .glass {
      position: relative;
      padding: 56px 40px 48px 72px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0 28px 28px 0;
      text-align: center;
    }
    /* Bite edge glow — purple light leaking through the teeth */
    .glass-wrap::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 20%;
      width: 80px;
      height: 60%;
      background: radial-gradient(ellipse at left, rgba(112,17,246,0.3) 0%, transparent 70%);
      filter: blur(16px);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 40px;
    }
    .logo img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 14px 24px 12px;
      margin-bottom: 36px;
    }
    .badge__label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .badge__logo {
      height: 28px;
      width: auto;
      object-fit: contain;
    }

    /* ── Heading ── */
    h1 {
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 6vw, 40px);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      color: #fff;
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary-light) 0%, #fff 50%, var(--primary-light) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ── Body ── */
    .body-text {
      font-size: clamp(14px, 3.2vw, 16px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(112,17,246,0.4), transparent);
      margin: 32px auto;
    }

    /* ── Status bar ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .status__live {
      width: 7px; height: 7px;
      background: #26BC6D;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(38, 188, 109, 0.5);
      animation: live-pulse 1.8s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(38, 188, 109, 0.5); }
      50% { opacity: 0.5; box-shadow: 0 0 16px rgba(38, 188, 109, 0.3); }
    }

    /* ── Bottom social row ── */
    .social {
      position: fixed;
      bottom: 32px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
    }
    .social a:hover {
      background: rgba(112, 17, 246, 0.12);
      border-color: rgba(112, 17, 246, 0.25);
      transform: translateY(-2px);
    }
    .social a svg {
      width: 18px; height: 18px;
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.3s;
    }
    .social a:hover svg { color: var(--primary-light); }

    /* ── Entrance animation ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .glass-wrap {
      animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .social {
      opacity: 0;
      animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    /* ── Tablet ── */
    @media (max-width: 768px) {
      .glass { padding: 48px 32px 40px 64px; }
      .logo { margin-bottom: 32px; }
      .badge { margin-bottom: 28px; }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 60px 0 100px; }
      .glass-wrap { width: calc(100% - 32px); }
      .glass {
        padding: 36px 20px 32px 52px;
        border-radius: 0 20px 20px 0;
      }
      .bite-shape {
        clip-path: polygon(
          0% 0%, 100% 0%, 100% 100%, 0% 100%,
          0% 76%,
          8% 73.5%, 0% 71%,
          9% 68.5%, 0% 66%,
          10% 63.5%, 0% 61%,
          9% 58.5%, 0% 56%,
          10% 53.5%, 0% 51%,
          9% 48.5%, 0% 46%,
          10% 43.5%, 0% 41%,
          9% 38.5%, 0% 36%,
          8% 33.5%, 0% 31%,
          7% 28.5%, 0% 26%,
          0% 0%
        );
      }
      .logo { margin-bottom: 28px; }
      .logo img { height: 28px; }
      .badge {
        padding: 10px 18px 8px;
        border-radius: 12px;
        margin-bottom: 24px;
      }
      .badge__label { font-size: 9px; }
      .badge__logo { height: 22px; }
      h1 { font-size: clamp(22px, 6vw, 28px); margin-bottom: 16px; }
      .body-text { font-size: 14px; line-height: 1.6; }
      .divider { margin: 24px auto; }
      .status { font-size: 11px; }
      .social {
        position: fixed;
        bottom: 20px;
        gap: 12px;
      }
      .social a {
        width: 36px; height: 36px;
        border-radius: 10px;
      }
      .social a svg { width: 16px; height: 16px; }
    }

    /* ── Very small phones ── */
    @media (max-width: 360px) {
      .glass-wrap { width: calc(100% - 20px); }
      .glass { padding: 28px 16px 28px 44px; }
      .logo img { height: 24px; }
      .badge__logo { height: 18px; }
      h1 { font-size: 20px; }
      .body-text { font-size: 13px; }
    }

    /* ── Safe area for notched phones ── */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .social { bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <!-- Animated mesh gradient -->
  <div class="mesh">
    <div class="mesh__orb mesh__orb--1"></div>
    <div class="mesh__orb mesh__orb--2"></div>
    <div class="mesh__orb mesh__orb--3"></div>
    <div class="mesh__orb mesh__orb--4"></div>
  </div>

  <!-- Film grain -->
  <div class="grain"></div>

  <!-- Main card -->
  <div class="glass-wrap">
    <div class="glass bite-shape">
      <div class="logo">
        <img src="https://media.rimigo.com/1772542368727_logo-transparent-white.png" alt="Rimigo" />
      </div>

      <div class="badge">
        <span class="badge__label">As seen on</span>
        <img class="badge__logo" src="https://media.rimigo.com/1772542519759_cropped-SHARK-TANK-INDIA.png" alt="Shark Tank India" />
      </div>

      <h1>We're experiencing<br/><em>incredible demand</em></h1>

      <p class="body-text">
        Thanks to our Shark Tank premiere, thousands of travelers are rushing to plan their next adventure. We're scaling up to welcome everyone.
      </p>

      <div class="divider"></div>

      <div class="status">
        <span class="status__live"></span>
        Team is on it — back shortly
      </div>
    </div>
  </div>

  <!-- Social links -->
  <div class="social">
    <a href="https://www.instagram.com/rimigo.travel/" aria-label="Instagram" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <a href="https://in.linkedin.com/company/rimigotravel" aria-label="LinkedIn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    </a>
    <a href="https://x.com/rimigo_travel" aria-label="X / Twitter" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </div>

</body>
</html>
